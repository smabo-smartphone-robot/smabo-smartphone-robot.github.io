<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>smabo作成のロードマップ — smabo ガイド</title>
  <meta name="description" content="smabo 作成のロードマップ。作りたい機能に合わせて、どのガイド記事をどの順で読めばよいかをインタラクティブなスキルツリーで示します。" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/roadmap.css" />
</head>
<body>

  <!-- ===== header ===== -->
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="../../index.html"><span class="brand__mark">🤖</span> smabo</a>
      <button class="nav__toggle" aria-label="メニューを開閉" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav__links">
        <a href="../../index.html#features">特徴</a>
        <a href="../../index.html#system">システム構成</a>
        <a href="../../roadmap.html">ロードマップ</a>
        <a href="../../components.html">コンポーネント詳細</a>
        <a class="btn btn--primary" href="https://github.com/smabo-smartphone-robot">GitHub</a>
      </nav>
    </div>
  </header>

  <!-- ===== hero / controls ===== -->
  <section class="roadmap-hero">
    <div class="container">
      <span class="eyebrow">Roadmap</span>
      <h1>smabo作成のロードマップ</h1>
      <p>smaboは、パーツを組み合わせることで、様々な機能を追加することができます。</p>
      <p>以下は、smabo作成のロードマップになります。</p>

      <div class="rmap-bar">
        <div class="rmap-progress">
          <div class="rmap-progress__top">
            <span>達成率</span>
            <span class="rmap-progress__count" id="rmap-count">0 / 13 記事クリア（0%）</span>
          </div>
          <div class="rmap-progress__track"><div class="rmap-progress__fill" id="rmap-fill"></div></div>
        </div>

        <button class="rmap-btn" id="rmap-reset" type="button">進捗をリセット</button>
      </div>

      <div class="rmap-hint">
        <ul>
          <li>各ノードにマウスをホバーすると、「これまでに読んでおく必要がある記事」と「これから先に繋がる記事」がハイライトされます。</li>
          <li>ノード本体をクリックすると各記事へ移動します。</li>
        </ul>
      </div>
    </div>
  </section>

  <!-- ===== the roadmap canvas ===== -->
  <section class="section" style="padding-top:0">
    <div class="container">
      <div class="rmap-wrap">
        <!-- data-guide-dir="" : the guide pages live in this same folder -->
        <svg id="rmap-svg" class="rmap-svg" viewBox="150 -16 1090 996" role="img"
             data-guide-dir="" aria-label="smabo 製作ガイドのロードマップ図"></svg>
      </div>

      <p class="doc-back" style="margin-top:40px">
        <a class="btn btn--ghost" href="../index.html">← ドキュメント一覧へ</a>
      </p>
    </div>
  </section>

  <!-- ===== footer ===== -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer__bottom">© <span id="year">2026</span> smabo-smartphone-robot</div>
    </div>
  </footer>

  <script src="../../js/main.js"></script>
  <script src="../../js/roadmap.js"></script>
</body>
</html>
