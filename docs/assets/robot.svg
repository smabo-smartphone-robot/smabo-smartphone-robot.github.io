<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-label="スマホが顔になったロボット smabo のイラスト">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef0fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="180" cy="332" rx="96" ry="14" fill="#4f46e5" opacity="0.12"/>

  <!-- antenna -->
  <line x1="180" y1="44" x2="180" y2="74" stroke="#94a3d4" stroke-width="6" stroke-linecap="round"/>
  <circle cx="180" cy="40" r="9" fill="url(#accent)"/>

  <!-- head / body block -->
  <rect x="74" y="70" width="212" height="180" rx="34" fill="url(#body)"/>
  <!-- ears -->
  <rect x="58" y="120" width="20" height="60" rx="10" fill="#4338ca"/>
  <rect x="282" y="120" width="20" height="60" rx="10" fill="#4338ca"/>

  <!-- phone screen = face -->
  <rect x="108" y="92" width="144" height="136" rx="20" fill="url(#screen)"/>
  <!-- notch -->
  <rect x="160" y="100" width="40" height="7" rx="3.5" fill="#cdd2ee"/>

  <!-- eyes -->
  <circle cx="152" cy="150" r="15" fill="#4f46e5"/>
  <circle cx="208" cy="150" r="15" fill="#4f46e5"/>
  <circle cx="157" cy="145" r="5" fill="#fff"/>
  <circle cx="213" cy="145" r="5" fill="#fff"/>
  <!-- smile -->
  <path d="M150 188 q30 26 60 0" stroke="#4f46e5" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="132" cy="178" r="8" fill="#22d3ee" opacity="0.45"/>
  <circle cx="228" cy="178" r="8" fill="#22d3ee" opacity="0.45"/>

  <!-- arms -->
  <rect x="40" y="196" width="42" height="16" rx="8" fill="url(#accent)" transform="rotate(18 61 204)"/>
  <rect x="278" y="196" width="42" height="16" rx="8" fill="url(#accent)" transform="rotate(-18 299 204)"/>

  <!-- wheels base -->
  <rect x="104" y="250" width="152" height="40" rx="20" fill="#3730a3"/>
  <circle cx="132" cy="270" r="18" fill="#1e1b4b"/>
  <circle cx="228" cy="270" r="18" fill="#1e1b4b"/>
  <circle cx="132" cy="270" r="7" fill="#06b6d4"/>
  <circle cx="228" cy="270" r="7" fill="#06b6d4"/>
</svg>
